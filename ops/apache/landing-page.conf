# ----------------------------------------------------------------------
# Apache Config
# ----------------------------------------------------------------------
# Đây là file cấu hình Apache local cho chính dự án hiện tại.
# Nó trỏ DocumentRoot vào thư mục public và bật PHP + rewrite để route
# MVC hoạt động đúng khi chạy bằng Apache trên máy local.

ServerName localhost
LoadModule php_module /opt/homebrew/opt/php/lib/httpd/modules/libphp.so
LoadModule rewrite_module libexec/apache2/mod_rewrite.so

<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot "/Volumes/HUY/Github/linh-thuc-tap/public"
    DirectoryIndex index.php index.html

    <Directory "/Volumes/HUY/Github/linh-thuc-tap/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "/private/var/log/apache2/landing-page-error.log"
    CustomLog "/private/var/log/apache2/landing-page-access.log" common
</VirtualHost>
