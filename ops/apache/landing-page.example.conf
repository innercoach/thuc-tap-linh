# ----------------------------------------------------------------------
# Apache Config Example
# ----------------------------------------------------------------------
# Đây là file cấu hình Apache mẫu.
# Người dùng cần đổi /path/to/project/public thành đường dẫn thật của dự
# án trên máy trước khi copy file này vào /etc/apache2/other/.

ServerName localhost
LoadModule php_module /opt/homebrew/opt/php/lib/httpd/modules/libphp.so
LoadModule rewrite_module libexec/apache2/mod_rewrite.so

<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot "/path/to/project/public"
    DirectoryIndex index.php index.html

    <Directory "/path/to/project/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "/private/var/log/apache2/landing-page-error.log"
    CustomLog "/private/var/log/apache2/landing-page-access.log" common
</VirtualHost>
